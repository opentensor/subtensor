[package]
name = "subtensor-weight-tools"
version = "0.1.0"
edition.workspace = true
license = "MIT"

description = "Lightweight tools for benchmark weight management"
repository = "https://github.com/opentensor/subtensor"
homepage = "https://bittensor.com"

[[bin]]
name = "weight-compare"
path = "src/weight_compare.rs"

[[bin]]
name = "weight-stub"
path = "src/weight_stub.rs"

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive"] }
syn = { workspace = true, features = ["full", "parsing"] }
