[package]
name = "stp-crypto"
version = "0.1.0"
edition.workspace = true
description = "Cryptographic primitives for subtensor (BLSAG ring signatures over Ristretto255)"

[dependencies]
blake2 = { version = "0.10", default-features = false }
codec = { package = "parity-scale-codec", version = "3", default-features = false, features = ["derive"] }
curve25519-dalek = { version = "4", default-features = false, features = [
    "alloc",
    "digest",
    "rand_core",
    "zeroize",
] }
digest = { version = "0.10", default-features = false }
rand_core = { version = "0.6", default-features = false, optional = true }
scale-info = { version = "2", default-features = false, features = ["derive"] }
subtensor-macros.workspace = true
zeroize = { version = "1", default-features = false, optional = true }

[dev-dependencies]
rand = "0.8"

[features]
default = ["std"]
std = [
    "blake2/std",
    "codec/std",
    "digest/std",
    "rand_core?/std",
    "scale-info/std",
]
# Enables sign() and generate_key_image(). Not needed for on-chain verification.
signing = ["rand_core", "zeroize"]

[lints]
workspace = true
