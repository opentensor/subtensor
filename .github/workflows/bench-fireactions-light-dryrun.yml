name: Bench Fireactions Light Dry-Run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to benchmark
        required: true
        default: fireactions-runners
      runner_label:
        description: Fireactions benchmark label
        required: true
      sweep_id:
        description: Sweep identifier
        required: true
      rep:
        description: Repetition number
        required: true
      bench_job_key:
        description: Job selector
        required: true
        default: smoke
      pr_number:
        description: Optional PR number for artifact fetch tests
        required: false
        default: "2483"

run-name: bench-fireactions-light | ${{ github.event.inputs.sweep_id }} | ${{ github.event.inputs.bench_job_key }} | ${{ github.event.inputs.runner_label }} | rep-${{ github.event.inputs.rep }}

concurrency:
  group: bench-fireactions-light-${{ github.event.inputs.sweep_id }}-${{ github.event.inputs.bench_job_key }}-${{ github.event.inputs.runner_label }}-rep-${{ github.event.inputs.rep }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  pull-requests: read
  packages: read

jobs:
  smoke:
    if: ${{ github.event.inputs.bench_job_key == 'smoke' }}
    runs-on: [self-hosted, ${{ github.event.inputs.runner_label }}]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Verify required tools
        run: |
          set -euo pipefail
          for cmd in docker gh jq git curl unzip bc; do
            command -v "$cmd"
          done
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Verify Rust toolchain
        run: |
          rustc --version
          cargo --version
      - name: Run Docker smoke test
        run: |
          docker pull hello-world:latest
          docker run --rm hello-world:latest

  noinstall-probes:
    if: ${{ github.event.inputs.bench_job_key == 'probes' }}
    runs-on: [self-hosted, ${{ github.event.inputs.runner_label }}]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Probe runner dependencies
        run: |
          set +e
          REQUIRED_MISSING=0
          for cmd in docker gh jq git curl unzip bc make clang pkg-config protoc llvm-config node npm; do
            command -v "$cmd" >/dev/null 2>&1 || REQUIRED_MISSING=$((REQUIRED_MISSING+1))
          done
          docker buildx version >/dev/null 2>&1 || REQUIRED_MISSING=$((REQUIRED_MISSING+1))
          docker compose version >/dev/null 2>&1 || REQUIRED_MISSING=$((REQUIRED_MISSING+1))
          pkg-config --exists openssl || REQUIRED_MISSING=$((REQUIRED_MISSING+1))
          pkg-config --exists libudev || REQUIRED_MISSING=$((REQUIRED_MISSING+1))
          [ -f /etc/ssl/certs/ca-certificates.crt ] || REQUIRED_MISSING=$((REQUIRED_MISSING+1))
          echo "required_missing=$REQUIRED_MISSING"
          [ "$REQUIRED_MISSING" -eq 0 ]

  update-chainspecs-dryrun:
    if: ${{ github.event.inputs.bench_job_key == 'update-chainspecs-dryrun' }}
    runs-on: [self-hosted, ${{ github.event.inputs.runner_label }}]
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      CARGO_BUILD_JOBS: 6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Dependency gate
        run: |
          set -euo pipefail
          for cmd in clang curl pkg-config llvm-config protoc git; do
            command -v "$cmd"
          done
          pkg-config --exists openssl
          pkg-config --exists libudev
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/build_all_chainspecs.sh

  build-docs-dryrun:
    if: ${{ github.event.inputs.bench_job_key == 'build-docs-dryrun' }}
    runs-on: [self-hosted, ${{ github.event.inputs.runner_label }}]
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: 4
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Dependency gate
        run: |
          set -euo pipefail
          for cmd in clang curl pkg-config llvm-config protoc; do
            command -v "$cmd"
          done
          pkg-config --exists openssl
          pkg-config --exists libudev
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - uses: actions-rs/cargo@v1
        with:
          command: doc
          args: --document-private-items

  publish-dryrun:
    if: ${{ github.event.inputs.bench_job_key == 'publish-dryrun' }}
    runs-on: [self-hosted, ${{ github.event.inputs.runner_label }}]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Dependency gate
        run: |
          set -euo pipefail
          for cmd in docker git; do
            command -v "$cmd"
          done
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}:dryrun-${{ github.run_id }}

  apply-dryrun:
    if: ${{ github.event.inputs.bench_job_key == 'apply-dryrun' }}
    runs-on: [self-hosted, ${{ github.event.inputs.runner_label }}]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Dependency gate
        run: |
          set -euo pipefail
          for cmd in gh git tar; do
            command -v "$cmd"
          done
      - name: Download latest bench patch artifact from benchmark workflow
        if: ${{ github.event.inputs.pr_number != '' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: run-benchmarks.yml
          pr: ${{ github.event.inputs.pr_number }}
          name: bench-patch
          path: .
          allow_forks: true
          check_artifacts: true
          search_artifacts: true
          workflow_conclusion: ""
          if_no_artifact_found: warn
      - name: Validate patch apply in dry-run mode
        run: |
          set -euo pipefail
          if [ -f "bench-patch.tgz" ]; then
            tar -xzf bench-patch.tgz
          elif [ -f "bench-patch/bench-patch.tgz" ]; then
            tar -xzf bench-patch/bench-patch.tgz
          fi
          if [ -f ".bench_patch/benchmark_patch.diff" ]; then
            git apply --check ".bench_patch/benchmark_patch.diff"
          else
            echo "No benchmark patch found"
          fi

  payload-dryrun:
    if: ${{ github.event.inputs.bench_job_key == 'payload-dryrun' }}
    runs-on: [self-hosted, ${{ github.event.inputs.runner_label }}]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Dependency gate
        run: |
          set -euo pipefail
          for cmd in curl jq; do
            command -v "$cmd"
          done
      - name: Render and validate payloads
        run: |
          set -euo pipefail
          HOTFIX_LABEL_PAYLOAD='{"labels":["hotfix"]}'
          echo "$HOTFIX_LABEL_PAYLOAD" | jq -e '.labels | index("hotfix")' >/dev/null
          BREAKING_BODY='@opentensor/cerebrum / @opentensor/gyrus / @opentensor/cortex breaking change detected! Please prepare accordingly!'
          BREAKING_PAYLOAD="$(jq -n --arg body "$BREAKING_BODY" '{body: $body}')"
          echo "$BREAKING_PAYLOAD" | jq -e '.body | length > 0' >/dev/null
