name: Bench Contract Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to benchmark
        required: true
        default: fireactions-runners
      runner_label:
        description: Fireactions benchmark label
        required: true
      sweep_id:
        description: Sweep identifier
        required: true
      rep:
        description: Repetition number
        required: true
      bench_job_key:
        description: Job selector
        required: true
        default: run

run-name: bench-contract-tests | ${{ github.event.inputs.sweep_id }} | ${{ github.event.inputs.bench_job_key }} | ${{ github.event.inputs.runner_label }} | rep-${{ github.event.inputs.rep }}

concurrency:
  group: bench-contract-tests-${{ github.event.inputs.sweep_id }}-${{ github.event.inputs.runner_label }}-rep-${{ github.event.inputs.rep }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  run:
    if: ${{ github.event.inputs.bench_job_key == 'run' }}
    runs-on: [self-hosted, ${{ github.event.inputs.runner_label }}]
    env:
      RUST_BACKTRACE: full
      CARGO_BUILD_JOBS: 6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y --no-install-recommends -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" build-essential clang curl libssl-dev llvm libudev-dev protobuf-compiler nodejs pkg-config
      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: 120
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            cd ${{ github.workspace }}
            npm install --global yarn
            ./contract-tests/run-ci.sh
