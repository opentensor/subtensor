name: Test Fireactions Validation Suite

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to validate"
        required: true
        default: "fireactions-runners"
      dry_run:
        description: "Must remain true for this validation workflow"
        required: true
        default: "true"
      pr_number:
        description: "Optional PR number for benchmark patch artifact fetch"
        required: false
        default: ""
      base_ref:
        description: "Simulated PR base branch for hotfix/label payload tests"
        required: false
        default: "main"
      head_ref:
        description: "Simulated PR head branch for hotfix/label payload tests"
        required: false
        default: "feature/fireactions-test"
      label_name:
        description: "Simulated label name for label payload tests"
        required: false
        default: "breaking-change"

permissions:
  contents: read
  actions: read
  pull-requests: read
  packages: read

concurrency:
  group: test-fireactions-validation-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'fireactions-runners' }}
    uses: ./.github/workflows/fireactions-smoke.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.head_ref || inputs.ref }}
      dry_run: ${{ github.event_name == 'pull_request' && 'true' || inputs.dry_run }}
    secrets: inherit

  noinstall-probes:
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'fireactions-runners' }}
    uses: ./.github/workflows/test-fireactions-noinstall-probes.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.head_ref || inputs.ref }}
      dry_run: ${{ github.event_name == 'pull_request' && 'true' || inputs.dry_run }}
    secrets: inherit

  docker-dryrun:
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'fireactions-runners' }}
    uses: ./.github/workflows/test-fireactions-docker-dryrun.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.head_ref || inputs.ref }}
      dry_run: ${{ github.event_name == 'pull_request' && 'true' || inputs.dry_run }}
    secrets: inherit

  docker-localnet-dryrun:
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'fireactions-runners' }}
    uses: ./.github/workflows/test-fireactions-docker-localnet-dryrun.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.head_ref || inputs.ref }}
      dry_run: ${{ github.event_name == 'pull_request' && 'true' || inputs.dry_run }}
    secrets: inherit

  rustdocs-dryrun:
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'fireactions-runners' }}
    uses: ./.github/workflows/test-fireactions-rustdocs-dryrun.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.head_ref || inputs.ref }}
      dry_run: ${{ github.event_name == 'pull_request' && 'true' || inputs.dry_run }}
    secrets: inherit

  update-chainspec-dryrun:
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'fireactions-runners' }}
    uses: ./.github/workflows/test-fireactions-update-chainspec-dryrun.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.head_ref || inputs.ref }}
      dry_run: ${{ github.event_name == 'pull_request' && 'true' || inputs.dry_run }}
    secrets: inherit

  apply-benchmark-patch-dryrun:
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'fireactions-runners' }}
    uses: ./.github/workflows/test-fireactions-apply-benchmark-patch-dryrun.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.head_ref || inputs.ref }}
      dry_run: ${{ github.event_name == 'pull_request' && 'true' || inputs.dry_run }}
      pr_number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr_number }}
    secrets: inherit

  hotfixes-labels-dryrun:
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'fireactions-runners' }}
    uses: ./.github/workflows/test-fireactions-hotfixes-labels-dryrun.yml
    with:
      ref: ${{ github.event_name == 'pull_request' && github.head_ref || inputs.ref }}
      dry_run: ${{ github.event_name == 'pull_request' && 'true' || inputs.dry_run }}
      pr_number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || (inputs.pr_number != '' && inputs.pr_number || '1') }}
      base_ref: ${{ github.event_name == 'pull_request' && github.base_ref || inputs.base_ref }}
      head_ref: ${{ github.event_name == 'pull_request' && github.head_ref || inputs.head_ref }}
      label_name: ${{ github.event_name == 'pull_request' && 'breaking-change' || inputs.label_name }}
    secrets: inherit
