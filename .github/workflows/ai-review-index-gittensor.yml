name: ai-review-index-gittensor

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch:

# Default: no write access. Each job opts in to what it needs.
permissions:
  contents: read

concurrency:
  group: ai-review-index-gittensor
  cancel-in-progress: false

jobs:
  # Runs the untrusted third-party gittensor code (pip install of an external
  # repo) with NO repository write access — only a read token, no secrets to
  # leak. The job's only output is the indexed JSON, uploaded as an artifact.
  index:
    name: index
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install gittensor (pinned to immutable commit SHA)
        # Pin to a specific reviewed commit, never @main. Any update requires a
        # new PR that re-reviews the upstream changes between SHAs.
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install 'git+https://github.com/entrius/gittensor.git@b9119169ac2c33b2f4c628af85acc9ed2d014bf9'

      - name: Run indexer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BITTENSOR_NETWORK: finney
        run: python .github/ai-review/index_gittensor.py

      - id: diff
        name: Detect changes
        run: |
          set -euo pipefail
          if git diff --quiet .github/ai-review/known-gittensor-accounts.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload indexed JSON
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: known-gittensor-accounts
          path: .github/ai-review/known-gittensor-accounts.json
          retention-days: 7

  # Trusted, minimal job: pulls the artifact produced by `index` and opens a
  # PR. It never runs the third-party code, so even if upstream gittensor is
  # compromised, the write-capable token here is shielded from it.
  open-pr:
    name: open-pr
    needs: index
    if: needs.index.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download indexed JSON
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: known-gittensor-accounts
          path: .github/ai-review/

      - name: Open PR if index changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet .github/ai-review/known-gittensor-accounts.json; then
            echo "Artifact matches current file — nothing to commit."
            exit 0
          fi
          BRANCH="ai-review/gittensor-index-$(date -u +%Y%m%d)"
          git config user.name 'subtensor-ai-review[bot]'
          git config user.email 'subtensor-ai-review@users.noreply.github.com'
          git checkout -b "$BRANCH"
          git add .github/ai-review/known-gittensor-accounts.json
          git commit -m "chore(ai-review): refresh gittensor account index"
          git push -u origin "$BRANCH"
          gh pr create \
            --base devnet-ready \
            --head "$BRANCH" \
            --title "chore(ai-review): refresh gittensor account index" \
            --body "Automated refresh of \`known-gittensor-accounts.json\` from on-chain bounty data."
