name: ai-review-index-gittensor

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-review-index-gittensor
  cancel-in-progress: false

jobs:
  index:
    name: index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gittensor + bittensor
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # Pin gittensor to a known-good ref periodically; HEAD is fine for now.
          pip install 'git+https://github.com/entrius/gittensor.git@main'

      - name: Run indexer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BITTENSOR_NETWORK: finney
        run: python .github/ai-review/index_gittensor.py

      - name: Open PR if index changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet .github/ai-review/known-gittensor-accounts.json; then
            echo "No changes."
            exit 0
          fi
          BRANCH="ai-review/gittensor-index-$(date -u +%Y%m%d)"
          git config user.name 'subtensor-ai-review[bot]'
          git config user.email 'subtensor-ai-review@users.noreply.github.com'
          git checkout -b "$BRANCH"
          git add .github/ai-review/known-gittensor-accounts.json
          git commit -m "chore(ai-review): refresh gittensor account index"
          git push -u origin "$BRANCH"
          gh pr create \
            --base devnet-ready \
            --head "$BRANCH" \
            --title "chore(ai-review): refresh gittensor account index" \
            --body "Automated refresh of \`known-gittensor-accounts.json\` from on-chain bounty data."
