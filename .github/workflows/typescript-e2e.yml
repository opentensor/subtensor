name: Typescript E2E Tests

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  typescript-formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ts-tests/.nvmrc

      - name: Install system dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y --no-install-recommends \
            -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
            build-essential clang curl git make libssl-dev llvm libudev-dev protobuf-compiler pkg-config

      - name: Install e2e dependencies
        working-directory: ts-tests
        run: pnpm install --frozen-lockfile

      - name: Formatting check
        run: |
          cd ts-tests
          pnpm run fmt

  # Build the node binary in both variants and share as artifacts.
  build:
    runs-on: [self-hosted, fireactions-heavy]
    needs: [typescript-formatting]
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - variant: release 
            flags: ""
          - variant: fast
            flags: "--features fast-runtime"
    env:
      RUST_BACKTRACE: full
    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y --no-install-recommends \
            -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
            build-essential clang curl git make libssl-dev llvm libudev-dev protobuf-compiler pkg-config

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Utilize Shared Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: e2e-${{ matrix.variant }}
          cache-on-failure: true

      - name: Build node-subtensor (${{ matrix.variant }})
        run: cargo build --profile release ${{ matrix.flags }} -p node-subtensor

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: node-subtensor-${{ matrix.variant }}
          path: target/release/node-subtensor
          if-no-files-found: error

  run-e2e-tests:
    needs: [build]
    runs-on: [self-hosted, fireactions-heavy]
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - test: dev
            binary: release
          - test: zombienet_shield
            binary: release
          - test: zombienet_staking
            binary: fast
          - test: zombienet_coldkey_swap
            binary: fast
          - test: zombienet_subnets
            binary: fast

    name: "typescript-e2e-${{ matrix.test }}"

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: node-subtensor-${{ matrix.binary }}
          path: target/release

      - name: Make binary executable
        run: chmod +x target/release/node-subtensor

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ts-tests/.nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install e2e dependencies
        working-directory: ts-tests
        run: pnpm install --frozen-lockfile

      - name: Diagnose WS vs HTTP (dev only)
        if: matrix.test == 'dev'
        working-directory: ts-tests
        run: |
          set +e
          MWDIR="$PWD/$(find node_modules/.pnpm -maxdepth 1 -type d -name '@moonwall+cli*' | head -1)/node_modules/@moonwall/cli"
          echo "moonwall dir: $MWDIR"
          cat > probe.mjs <<'PEOF'
          import { createRequire } from 'module';
          const req = createRequire(process.env.MWDIR + '/');
          const WebSocket = req('ws');
          const port = process.env.P || '10144';
          console.log('moonwall ws version:', req('ws/package.json').version);
          function readiness(host){
            return new Promise((resolve)=>{
              const ws = new WebSocket('ws://'+host+':'+port);
              const hard=setTimeout(()=>{try{ws.close()}catch(e){};resolve('[readiness] '+host+' => HANG (no open/error 10s)');},10000);
              ws.on('open',()=>{ ws.send(JSON.stringify({jsonrpc:'2.0',id:1,method:'system_chain',params:[]}));
                ws.on('message',d=>{try{const r=JSON.parse(d.toString());if(r.jsonrpc==='2.0'&&!r.error){clearTimeout(hard);ws.close();resolve('[readiness] '+host+' => READY ('+r.result+')');}}catch(e){}}); });
              ws.on('error',e=>{clearTimeout(hard);resolve('[readiness] '+host+' => ERROR '+e.message);});
            });
          }
          async function papi(host){
            try{ const { ApiPromise, WsProvider } = await import('@polkadot/api');
              const api=await ApiPromise.create({provider:new WsProvider('ws://'+host+':'+port)});
              const c=(await api.rpc.system.chain()).toString(); await api.disconnect();
              return '[polkadot.js] '+host+' => READY ('+c+')';
            }catch(e){ return '[polkadot.js] '+host+' => FAIL '+((e&&e.message)||e); }
          }
          for (const h of ['localhost','127.0.0.1']) console.log(await readiness(h));
          for (const h of ['localhost','127.0.0.1']) console.log(await papi(h));
          process.exit(0);
          PEOF
          ( ../target/release/node-subtensor --one --dev --force-authoring --rpc-cors=all \
              --no-prometheus --no-telemetry --reserved-only --tmp --sealing=manual \
              --pool-type=single-state --rpc-port 10144 > /tmp/n.log 2>&1 & )
          sleep 8
          echo "== ss listening on 10144 =="; ss -ltnp 2>/dev/null | grep ':10144' || echo "(nothing)"
          echo "== moonwall readiness-gate replica (ws 8.19.0) + polkadot.js control =="
          MWDIR="$MWDIR" P=10144 node probe.mjs 2>&1 | grep -avE "REGISTRY:|API/INIT:"
          echo "== node log tail =="; tail -4 /tmp/n.log
          pkill -f "rpc-port 10144" 2>/dev/null || true
          true

      - name: Run tests
        env:
          DEBUG: api-ws
        run: |
          cd ts-tests
          pnpm moonwall test ${{ matrix.test }}
