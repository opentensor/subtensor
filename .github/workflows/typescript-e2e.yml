name: Typescript E2E Tests

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  typescript-formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ts-tests/.nvmrc

      - name: Install system dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y --no-install-recommends \
            -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
            build-essential clang curl git make libssl-dev llvm libudev-dev protobuf-compiler pkg-config

      - name: Install e2e dependencies
        working-directory: ts-tests
        run: pnpm install --frozen-lockfile

      - name: Formatting check
        run: |
          cd ts-tests
          pnpm run fmt

  # Build the node binary in both variants and share as artifacts.
  build:
    runs-on: [self-hosted, fireactions-heavy]
    needs: [typescript-formatting]
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - variant: release 
            flags: ""
          - variant: fast
            flags: "--features fast-runtime"
    env:
      RUST_BACKTRACE: full
    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y --no-install-recommends \
            -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
            build-essential clang curl git make libssl-dev llvm libudev-dev protobuf-compiler pkg-config

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Utilize Shared Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: e2e-${{ matrix.variant }}
          cache-on-failure: true

      - name: Build node-subtensor (${{ matrix.variant }})
        run: cargo build --profile release ${{ matrix.flags }} -p node-subtensor

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: node-subtensor-${{ matrix.variant }}
          path: target/release/node-subtensor
          if-no-files-found: error

  run-e2e-tests:
    needs: [build]
    runs-on: [self-hosted, fireactions-heavy]
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - test: dev
            binary: release
          - test: zombienet_shield
            binary: release
          - test: zombienet_staking
            binary: fast
          - test: zombienet_coldkey_swap
            binary: fast
          - test: zombienet_subnets
            binary: fast

    name: "typescript-e2e-${{ matrix.test }}"

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: node-subtensor-${{ matrix.binary }}
          path: target/release

      - name: Make binary executable
        run: chmod +x target/release/node-subtensor

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ts-tests/.nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install e2e dependencies
        working-directory: ts-tests
        run: pnpm install --frozen-lockfile

      - name: Diagnose WS vs HTTP (dev only)
        if: matrix.test == 'dev'
        working-directory: ts-tests
        run: |
          set +e
          cat > papi.mjs <<'PEOF'
          const { ApiPromise, WsProvider } = await import('@polkadot/api');
          const port = process.env.PROBE_PORT || '9944';
          async function probe(url){
            return await new Promise((resolve)=>{
              const t=setTimeout(()=>resolve(url+' => TIMEOUT 20s (never ready)'),20000);
              const provider=new WsProvider(url);
              provider.on('connected',()=>console.log(url,'=> WS connected'));
              provider.on('error',e=>console.log(url,'=> provider error:',(e&&e.message)||String(e)));
              ApiPromise.create({provider})
                .then(async(api)=>{const c=(await api.rpc.system.chain()).toString();await api.disconnect();clearTimeout(t);resolve(url+' => READY chain='+c);})
                .catch(e=>{clearTimeout(t);resolve(url+' => FAIL '+((e&&e.message)||e));});
            });
          }
          for (const h of ['127.0.0.1','localhost']) console.log(await probe('ws://'+h+':'+port));
          process.exit(0);
          PEOF
          for PROBE_PORT in 9944 10144; do
            echo "######## PORT $PROBE_PORT (9944=control, 10144=moonwall dynamic range) ########"
            ( ../target/release/node-subtensor --one --dev --force-authoring --rpc-cors=all \
                --no-prometheus --no-telemetry --reserved-only --tmp --sealing=manual \
                --pool-type=single-state --rpc-port $PROBE_PORT > /tmp/n_$PROBE_PORT.log 2>&1 & )
            sleep 8
            echo "-- ss listening on $PROBE_PORT --"; ss -ltnp 2>/dev/null | grep ":$PROBE_PORT" || echo "(nothing on $PROBE_PORT)"
            echo "-- HTTP curl 127.0.0.1:$PROBE_PORT --"
            curl -sS -m 5 -H 'Content-Type: application/json' -d '{"jsonrpc":"2.0","id":1,"method":"system_health","params":[]}' http://127.0.0.1:$PROBE_PORT || echo ">>> HTTP FAIL"
            echo; echo "-- polkadot.js WS probe (what moonwall uses) --"; PROBE_PORT=$PROBE_PORT node papi.mjs
            echo "-- node log tail --"; tail -4 /tmp/n_$PROBE_PORT.log
            pkill -f "rpc-port $PROBE_PORT" 2>/dev/null || true
            sleep 2
          done
          true

      - name: Run tests
        env:
          DEBUG: api-ws
        run: |
          cd ts-tests
          pnpm moonwall test ${{ matrix.test }}
