name: ai-review

on:
  # Triggered AFTER the Check Rust workflow completes, so we don't burn a
  # runner polling for completion. We then check conclusion=='success' to gate.
  # Note: workflow_run only fires for workflow files present on the repo's
  # DEFAULT branch — until this workflow is merged there, PRs cannot auto-trigger.
  # Use workflow_dispatch for one-off runs in the meantime.
  workflow_run:
    workflows: ["Check Rust"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (skeptic only — used for the testnet→main standalone gate or manual reruns)'
        required: true
        type: number
      persona:
        description: 'Which persona to run'
        required: true
        type: choice
        default: 'skeptic'
        options: [skeptic, auditor, both]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write

concurrency:
  group: ai-review-${{ github.event.workflow_run.head_sha || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  decide:
    name: decide
    runs-on: ubuntu-latest
    # Only proceed if Check Rust succeeded (or we were dispatched manually).
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      pr_number: ${{ steps.compute.outputs.pr_number }}
      head_sha: ${{ steps.compute.outputs.head_sha }}
      head_ref: ${{ steps.compute.outputs.head_ref }}
      base_ref: ${{ steps.compute.outputs.base_ref }}
      head_owner: ${{ steps.compute.outputs.head_owner }}
      author: ${{ steps.compute.outputs.author }}
      is_fork: ${{ steps.compute.outputs.is_fork }}
      run_skeptic: ${{ steps.compute.outputs.run_skeptic }}
      run_auditor: ${{ steps.compute.outputs.run_auditor }}
    steps:
      - id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR: ${{ github.event.inputs.pr_number }}
          INPUT_PERSONA: ${{ github.event.inputs.persona }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            PR="$INPUT_PR"
            PERSONA="$INPUT_PERSONA"
          else
            # workflow_run.pull_requests is empty for fork PRs; look up by SHA instead.
            PR=$(gh api "repos/$REPO/commits/$RUN_HEAD_SHA/pulls" --jq '.[0].number')
            if [[ -z "$PR" || "$PR" == "null" ]]; then
              echo "No open PR for SHA $RUN_HEAD_SHA — skipping."
              exit 0
            fi
            PERSONA=""
          fi

          PR_JSON=$(gh pr view "$PR" --repo "$REPO" \
            --json number,headRefName,baseRefName,headRefOid,headRepository,headRepositoryOwner,author)

          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')
          BASE_REF=$(echo "$PR_JSON" | jq -r '.baseRefName')
          HEAD_OWNER=$(echo "$PR_JSON" | jq -r '.headRepositoryOwner.login')
          AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login')
          BASE_OWNER='${{ github.repository_owner }}'
          if [[ "$HEAD_OWNER" == "$BASE_OWNER" ]]; then
            IS_FORK=false
          else
            IS_FORK=true
          fi

          # Skip if the workflow_run was for a stale SHA (PR has been pushed since).
          if [[ "$EVENT_NAME" == "workflow_run" && -n "$RUN_HEAD_SHA" && "$RUN_HEAD_SHA" != "$HEAD_SHA" ]]; then
            echo "Workflow_run SHA $RUN_HEAD_SHA is stale (PR head is now $HEAD_SHA) — skipping."
            exit 0
          fi

          if [[ -n "$PERSONA" ]]; then
            case "$PERSONA" in
              skeptic) RUN_SKEPTIC=true; RUN_AUDITOR=false ;;
              auditor) RUN_SKEPTIC=false; RUN_AUDITOR=true ;;
              both)    RUN_SKEPTIC=true; RUN_AUDITOR=true ;;
            esac
          else
            # Default routing per branch policy:
            #   testnet -> main : skeptic only (final security gate before mainnet)
            #   anything else   : both
            if [[ "$BASE_REF" == "main" && "$HEAD_REF" == "testnet" ]]; then
              RUN_SKEPTIC=true; RUN_AUDITOR=false
            else
              RUN_SKEPTIC=true; RUN_AUDITOR=true
            fi
          fi

          {
            echo "pr_number=$PR"
            echo "head_sha=$HEAD_SHA"
            echo "head_ref=$HEAD_REF"
            echo "base_ref=$BASE_REF"
            echo "head_owner=$HEAD_OWNER"
            echo "author=$AUTHOR"
            echo "is_fork=$IS_FORK"
            echo "run_skeptic=$RUN_SKEPTIC"
            echo "run_auditor=$RUN_AUDITOR"
          } >> "$GITHUB_OUTPUT"

  skeptic:
    name: skeptic
    needs: decide
    if: needs.decide.outputs.run_skeptic == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          fetch-depth: 0

      - name: Run Codex (skeptic persona)
        id: codex
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.decide.outputs.pr_number }}
          BASE_REF: ${{ needs.decide.outputs.base_ref }}
          HEAD_REF: ${{ needs.decide.outputs.head_ref }}
          AUTHOR: ${{ needs.decide.outputs.author }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          output-file: skeptic-output.md
          prompt: |
            You are running as the **Skeptic** persona reviewing PR #${{ needs.decide.outputs.pr_number }}
            in the opentensor/subtensor repository.

            Branch: `${{ needs.decide.outputs.head_ref }}` -> `${{ needs.decide.outputs.base_ref }}`
            Author: `${{ needs.decide.outputs.author }}`

            **Read these files in full and follow them as your operating instructions:**

            1. `.github/ai-review/common.md` — shared review context, severity tags, branch policy
            2. `.github/ai-review/skeptic.md` — your persona's full operating procedure
            3. `.github/copilot-instructions.md` — domain threat model (treat as supplementary context)

            Your only output should be the verdict comment as specified by `skeptic.md`. The verdict
            line must appear at the very top, on its own line, in the form:

                VERDICT: [SAFE]
                VERDICT: [VULNERABLE]
                VERDICT: [MALICIOUS]

            End your output with the literal HTML marker `<!-- ai-review:skeptic -->`.

            Hard rules (also stated in skeptic.md): do NOT compile, build, install, or run any
            code from this PR. Static analysis only. You may use `gh`, `git log`, `git show`,
            `git diff`, `grep`, and read files. You may not invoke `cargo`, `npm`, `make`,
            `docker`, or any script that executes PR code.

      - name: Post sticky comment (skeptic verdict)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ needs.decide.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ ! -s skeptic-output.md ]]; then
            echo "::error::Codex produced no output."
            exit 1
          fi
          MARKER='<!-- ai-review:skeptic -->'
          if ! grep -qF "$MARKER" skeptic-output.md; then
            echo "$MARKER" >> skeptic-output.md
          fi
          EXISTING_ID=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq '.[] | select(.body | contains("'"$MARKER"'")) | .id' | tail -1)
          if [[ -n "$EXISTING_ID" ]]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$EXISTING_ID" \
              -F body=@skeptic-output.md >/dev/null
          else
            gh pr comment "$PR" --repo "$REPO" --body-file skeptic-output.md
          fi

      - name: Parse verdict and set check status
        env:
          MARKER: '<!-- ai-review:skeptic -->'
        run: |
          set -euo pipefail
          VERDICT=$(grep -oE 'VERDICT:[[:space:]]*\[(SAFE|VULNERABLE|MALICIOUS)\]' skeptic-output.md | head -1 || true)
          echo "Detected verdict: $VERDICT"
          case "$VERDICT" in
            *SAFE*)        exit 0 ;;
            *VULNERABLE*)  echo "::error::Skeptic flagged vulnerabilities."; exit 1 ;;
            *MALICIOUS*)   echo "::error::Skeptic flagged the PR as malicious."; exit 1 ;;
            *)             echo "::error::No parseable verdict in skeptic output."; exit 1 ;;
          esac

  auditor:
    name: auditor
    needs: [decide, skeptic]
    if: needs.decide.outputs.run_auditor == 'true' && needs.skeptic.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity (for auto-fix commits)
        if: needs.decide.outputs.is_fork == 'false'
        run: |
          git config user.name 'subtensor-ai-review[bot]'
          git config user.email 'subtensor-ai-review@users.noreply.github.com'

      - name: Run Codex (auditor persona)
        id: codex
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.decide.outputs.pr_number }}
          BASE_REF: ${{ needs.decide.outputs.base_ref }}
          HEAD_REF: ${{ needs.decide.outputs.head_ref }}
          IS_FORK: ${{ needs.decide.outputs.is_fork }}
          AUTHOR: ${{ needs.decide.outputs.author }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          output-file: auditor-output.md
          prompt: |
            You are running as the **Auditor** persona reviewing PR #${{ needs.decide.outputs.pr_number }}
            in the opentensor/subtensor repository.

            Branch: `${{ needs.decide.outputs.head_ref }}` -> `${{ needs.decide.outputs.base_ref }}`
            Author: `${{ needs.decide.outputs.author }}`
            is_fork: `${{ needs.decide.outputs.is_fork }}`  (when true, you cannot push commits — fall back to suggestion blocks)

            **Read these files in full and follow them as your operating instructions:**

            1. `.github/ai-review/common.md` — shared review context
            2. `.github/ai-review/auditor.md` — your persona's full operating procedure
            3. `.github/copilot-instructions.md` — domain rules to enforce

            The Skeptic has already cleared this PR. You may run builds, tests, and scripts —
            but do so only when a finding requires runtime confirmation, not by default.

            Your final stdout must be the verdict comment as specified in `auditor.md`. The
            verdict line must be at the top in the form:

                VERDICT: 👍
                VERDICT: 👎

            End your output with the literal HTML marker `<!-- ai-review:auditor -->`.

            For auto-fixes (lints, spec_version bump, Cargo.lock): when is_fork is `false`,
            commit them in a single commit titled `chore: auditor auto-fix` and push to the
            PR branch. When is_fork is `true`, do NOT attempt to push — emit suggestion blocks
            in the verdict comment instead.

      - name: Post sticky comment (auditor verdict)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ needs.decide.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ ! -s auditor-output.md ]]; then
            echo "::error::Codex produced no output."
            exit 1
          fi
          MARKER='<!-- ai-review:auditor -->'
          if ! grep -qF "$MARKER" auditor-output.md; then
            echo "$MARKER" >> auditor-output.md
          fi
          EXISTING_ID=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq '.[] | select(.body | contains("'"$MARKER"'")) | .id' | tail -1)
          if [[ -n "$EXISTING_ID" ]]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$EXISTING_ID" \
              -F body=@auditor-output.md >/dev/null
          else
            gh pr comment "$PR" --repo "$REPO" --body-file auditor-output.md
          fi

      - name: Parse verdict and set check status
        run: |
          set -euo pipefail
          if grep -qE 'VERDICT:[[:space:]]*👍' auditor-output.md; then
            exit 0
          elif grep -qE 'VERDICT:[[:space:]]*👎' auditor-output.md; then
            echo "::error::Auditor blocked the PR."
            exit 1
          else
            echo "::error::No parseable verdict in auditor output."
            exit 1
          fi
