name: Test Fireactions Update Chainspec Dry-Run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to validate"
        required: true
        default: "fireactions-runners"
      dry_run:
        description: "Must remain true for this test workflow"
        required: true
        default: "true"

permissions:
  contents: read

concurrency:
  group: test-fireactions-update-chainspec-dryrun-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-chainspecs-dryrun:
    runs-on: [self-hosted, fireactions]
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
    steps:
      - name: Enforce dry-run mode
        run: |
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            echo "dry_run must be true for this workflow."
            exit 1
          fi

      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Dependency gate (no installs)
        run: |
          set -euo pipefail
          for cmd in clang curl pkg-config llvm-config protoc git; do
            command -v "$cmd"
          done
          pkg-config --exists openssl
          pkg-config --exists libudev

      - name: Install Rust toolchain (run-specific)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Utilize Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build chainspecs
        run: ./scripts/build_all_chainspecs.sh

      - name: Generate dry-run diff report
        run: |
          {
            echo "# Update Chainspec Dry-Run Report"
            echo
            echo "- Ref: \`${{ github.event.inputs.ref }}\`"
            echo
            if git diff --quiet; then
              echo "No changes detected."
            else
              echo "Changes detected."
              echo
              echo "## Changed files"
              git diff --name-only | sed 's/^/- /'
              echo
              echo "## Diff stat"
              git diff --stat
            fi
          } > chainspecs-dryrun-report.md

          git diff > chainspecs-dryrun.patch || true

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chainspecs-dryrun
          path: |
            chainspecs-dryrun-report.md
            chainspecs-dryrun.patch
          if-no-files-found: warn
