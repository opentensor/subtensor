# TEMPORARY: Remove before merging to main/devnet-ready
name: Test Fireactions Docker Localnet Dry-Run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to validate"
        required: true
        default: "fireactions-runners"
      dry_run:
        description: "Must remain true for this test workflow"
        required: true
        default: "true"
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: "fireactions-runners"
      dry_run:
        required: false
        type: string
        default: "true"

permissions:
  contents: read
  actions: read
  packages: read

concurrency:
  group: test-fireactions-docker-localnet-dryrun-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on:
      group: fireactions
      labels: [self-hosted, fireactions-light]
    outputs:
      ref: ${{ steps.vars.outputs.ref }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Enforce dry-run mode
        run: |
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "dry_run must be true for this workflow."
            exit 1
          fi

      - name: Determine ref and tag
        id: vars
        run: |
          echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          echo "tag=dryrun-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

  artifacts:
    name: Node • ${{ matrix.runtime }} • amd64
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        runtime: ["fast-runtime", "non-fast-runtime"]
    runs-on:
      group: fireactions
      labels: [self-hosted, fireactions-heavy]
    timeout-minutes: 120
    env:
      CARGO_BUILD_JOBS: 6
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Dependency gate (no installs)
        run: |
          set -euo pipefail
          for cmd in docker clang pkg-config protoc; do
            command -v "$cmd"
          done
          pkg-config --exists openssl
          pkg-config --exists libudev

      - name: Install Rust toolchain (run-specific)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.88.0

      - name: Verify Rust toolchain commands
        run: |
          command -v rustup
          command -v cargo

      - name: Add Rust target triple
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Patch limits for local run
        run: |
          chmod +x ./scripts/localnet_patch.sh
          ./scripts/localnet_patch.sh

      - name: Build binaries
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          export CARGO_BUILD_TARGET="x86_64-unknown-linux-gnu"
          if [ "${{ matrix.runtime }}" = "fast-runtime" ]; then
            ./scripts/localnet.sh --build-only
          else
            ./scripts/localnet.sh False --build-only
          fi

      - name: Prepare artifacts for upload
        run: |
          RUNTIME="${{ matrix.runtime }}"
          TRIPLE="x86_64-unknown-linux-gnu"
          mkdir -p build/ci_target/${RUNTIME}/${TRIPLE}/release/
          cp -v target/${RUNTIME}/${TRIPLE}/release/node-subtensor \
            build/ci_target/${RUNTIME}/${TRIPLE}/release/
          mkdir -p build/ci_target/${RUNTIME}/${TRIPLE}/release/wbuild/node-subtensor-runtime/
          cp -v target/${RUNTIME}/${TRIPLE}/release/wbuild/node-subtensor-runtime/node_subtensor_runtime.compact.compressed.wasm \
            build/ci_target/${RUNTIME}/${TRIPLE}/release/wbuild/node-subtensor-runtime/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dryrun-binaries-x86_64-unknown-linux-gnu-${{ matrix.runtime }}
          path: build/
          if-no-files-found: error

  docker:
    needs: [setup, artifacts]
    runs-on:
      group: fireactions
      labels: [self-hosted, fireactions-heavy]
    timeout-minutes: 90
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Download all binary artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: dryrun-binaries-*
          path: build/
          merge-multiple: true

      - name: Dependency gate (no installs)
        run: |
          set -euo pipefail
          command -v docker
          docker version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build Docker image (dry-run, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-localnet
          build-args: |
            BUILT_IN_CI="Boom shakalaka"
          push: false
          load: false
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}-localnet:${{ needs.setup.outputs.tag }}
