name: Bench Docker Publish Dry Run

on:
  workflow_dispatch:
    inputs:
      branch-or-tag:
        description: "Branch or tag to use for the Docker tag and ref to checkout (optional)"
        required: false
        default: ""
      runner_label:
        description: "Self-hosted runner label to benchmark on"
        required: false
        default: "fa-fastcores"

concurrency:
  group: bench-docker-dryrun-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, "${{ inputs.runner_label }}"]

    steps:
      - name: Determine Docker tag and ref
        run: |
          branch_or_tag="${{ github.event.inputs.branch-or-tag || github.ref_name }}"
          echo "Determined branch or tag: $branch_or_tag"
          echo "tag=$branch_or_tag" >> "$GITHUB_ENV"
          echo "ref=$branch_or_tag" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: subtensor-bench:${{ env.tag }}
