name: Bench Check Spec Version

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to benchmark
        required: true
        default: fireactions-runners
      runner_label:
        description: Fireactions benchmark label
        required: true
      sweep_id:
        description: Sweep identifier
        required: true
      rep:
        description: Repetition number
        required: true
      bench_job_key:
        description: Job selector (check-devnet, check-finney, check-testnet)
        required: true
        default: check-devnet

run-name: bench-check-spec-version | ${{ inputs.sweep_id }} | ${{ inputs.bench_job_key }} | ${{ inputs.runner_label }} | rep-${{ inputs.rep }}

concurrency:
  group: bench-check-spec-version-${{ inputs.sweep_id }}-${{ inputs.bench_job_key }}-${{ inputs.runner_label }}-rep-${{ inputs.rep }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 4

jobs:
  check-spec-version:
    runs-on: [self-hosted, ${{ inputs.runner_label }}]
    steps:
      - name: Resolve target network URI
        id: net
        run: |
          case "${{ inputs.bench_job_key }}" in
            check-devnet) echo "uri=wss://dev.chain.opentensor.ai:443" >> "$GITHUB_OUTPUT" ;;
            check-finney) echo "uri=wss://entrypoint-finney.opentensor.ai:443" >> "$GITHUB_OUTPUT" ;;
            check-testnet) echo "uri=wss://test.finney.opentensor.ai:443" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported bench_job_key: ${{ inputs.bench_job_key }}"; exit 1 ;;
          esac
      - name: Dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y --no-install-recommends -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" build-essential clang curl libssl-dev llvm libudev-dev protobuf-compiler pkg-config bc
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-spec-version
          cache-on-failure: true
          save-if: true
      - run: cargo install substrate-spec-version
      - name: Check that spec_version has been bumped
        run: |
          spec_version=$(PATH=$PATH:$HOME/.cargo/.bin substrate-spec-version "${{ steps.net.outputs.uri }}" | tr -d '\n')
          echo "network spec_version: $spec_version"
          : ${spec_version:?bad spec version}
          local_spec_version=$(cargo run -p subtensor-tools --bin spec-version | tr -d '\n')
          echo "local spec_version: $local_spec_version"
          if (( $(echo "$local_spec_version <= $spec_version" | bc -l) )); then
            echo "$local_spec_version <= $spec_version ❌"
            exit 1
          fi
          echo "$local_spec_version > $spec_version ✅"
